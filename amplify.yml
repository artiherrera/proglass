version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            # Next.js 16 requiere Node >= 20. nvm viene en la imagen de Amplify.
            - nvm install 20
            - nvm use 20
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        # `output: "export"` escribe el sitio estático en ./out
        baseDirectory: out
        files:
          - '**/*'
      cache:
        paths:
          # Solo dependencias. NO cacheamos .next/cache: contiene el data-cache
          # de Shopify y, si persiste entre builds, mostraría contenido viejo.
          # Cada rebuild (push o webhook) debe leer Shopify fresco.
          - node_modules/**/*
